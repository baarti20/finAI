<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — FinAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="hero-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-icon">◈</span><span>Fin<em>AI</em></span>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo"><span class="logo-icon">◈</span><span>Fin<em>AI</em></span></div>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join FinAI and start predicting your financial future</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" class="form-control" placeholder="johndoe" autocomplete="username" oninput="validateField(this,'username')"/>
      <div class="field-hint" id="usernameHint"></div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@email.com" autocomplete="email" oninput="validateField(this,'email')"/>
      <div class="field-hint" id="emailHint"></div>
    </div>
    <div class="form-group">
      <label>Password <span style="color:var(--text-dim);font-size:0.8rem">(min 6 chars)</span></label>
      <div style="position:relative">
        <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="new-password" oninput="validateField(this,'password')"/>
        <button type="button" onclick="togglePwd('password',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem">👁</button>
      </div>
      <div class="pwd-strength-bar"><div id="pwdStrengthFill"></div></div>
      <div class="field-hint" id="passwordHint"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div style="position:relative">
        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" autocomplete="new-password" oninput="validateField(this,'confirm')"/>
        <button type="button" onclick="togglePwd('confirmPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem">👁</button>
      </div>
      <div class="field-hint" id="confirmHint"></div>
    </div>

    <div class="form-group">
      <label>Date of Birth <span style="color:var(--text-dim);font-size:0.8rem">(used to recover your account)</span></label>
      <input type="date" id="dob" class="form-control" autocomplete="bday"/>
      <div class="field-hint" id="dobHint"></div>
    </div>

    <button class="btn-primary btn-full" id="registerBtn" onclick="doRegister()">
      <span class="loading-spin" id="spin"></span>
      <span id="btnText">Create Account</span>
      <span class="btn-arrow">→</span>
    </button>

    <div class="auth-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
