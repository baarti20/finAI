<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — FinAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="hero-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-icon">◈</span><span>Fin<em>AI</em></span>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo"><span class="logo-icon">◈</span><span>Fin<em>AI</em></span></div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your financial intelligence dashboard</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary btn-full" id="loginBtn" onclick="doLogin()">
      <span class="loading-spin" id="spin"></span>
      <span id="btnText">Sign In</span>
      <span class="btn-arrow">→</span>
    </button>

    <div class="auth-link">
      Don't have an account? <a href="/register">Create one free</a>
    </div>
    <div class="auth-link" style="margin-top:8px;font-size:0.8rem;color:var(--text-dim)">
      Admin demo: admin@finai.com / admin123
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
